<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantalla Principal</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --accent: #35b8f1; --text: #f0ece4; --muted: #444450;
    --bubble-bg: rgba(53,184,241,0.06); --bubble-border: rgba(53,184,241,0.22); --line-color: rgba(53,184,241,0.38);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(53,184,241,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(53,184,241,0.022) 1px, transparent 1px);
    background-size: 64px 64px; pointer-events: none; z-index: 0;
  }
  #sala-badge { position: fixed; top: 16px; left: 20px; z-index: 200; background: rgba(10,10,15,0.75); border: 0.5px solid rgba(53,184,241,0.2); border-radius: 10px; padding: 10px 16px; backdrop-filter: blur(12px); display: flex; flex-direction: column; gap: 3px; }
  #sala-label { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2.5px; color: rgba(53,184,241,0.45); text-transform: uppercase; line-height: 1; }
  #sala-code  { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 6px; line-height: 1; }
  #sala-hint  { font-family: 'Space Mono', monospace; font-size: 8px; color: rgba(240,236,228,0.2); letter-spacing: 1px; }
  #room-badge { position: fixed; top: 16px; right: 20px; display: flex; align-items: center; gap: 10px; z-index: 200; background: rgba(10,10,15,0.75); border: 0.5px solid rgba(53,184,241,0.2); border-radius: 8px; padding: 8px 16px 8px 12px; backdrop-filter: blur(12px); }
  #room-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s; }
  #room-dot.online     { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
  #room-dot.connecting { background: #f5a623; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #badge-inner { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  #room-label-small { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; color: rgba(53,184,241,0.45); text-transform: uppercase; line-height: 1; }
  #room-code { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; line-height: 1; }
  #conn-badge { position: fixed; bottom: 20px; left: 20px; z-index: 200; font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(240,236,228,0.3); display: flex; align-items: center; gap: 6px; }
  #conn-count { color: var(--accent); font-weight: 700; font-size: 14px; }
  #qr-badge { position: fixed; bottom: 16px; right: 16px; z-index: 200; background: rgba(10,10,15,0.82); border: 0.5px solid rgba(53,184,241,0.2); border-radius: 10px; padding: 8px 8px 6px; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; gap: 5px; }
  #qr-label { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; color: rgba(53,184,241,0.45); text-transform: uppercase; line-height: 1; }
  #qr-img { width: 110px; height: 110px; border-radius: 6px; display: block; }
  #waiting-msg { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(53,184,241,0.3); font-family: 'Space Mono', monospace; letter-spacing: 2px; white-space: nowrap; animation: fadeWait 2.5s ease-in-out infinite; z-index: 100; }
  @keyframes fadeWait { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
  #canvas { position: relative; width: 100vw; height: 100vh; z-index: 1; }
  svg#lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  .bubble { position: absolute; border-radius: 50%; border: 1.5px solid var(--bubble-border); display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bubble-bg); transform: translate(-50%, -50%); backdrop-filter: blur(8px); text-align: center; pointer-events: none; z-index: 10; transition: border-color 0.5s, box-shadow 0.5s, background 0.5s; will-change: left, top; animation: popIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
  .bubble.connected { border-color: rgba(53,184,241,0.65); background: rgba(53,184,241,0.09); box-shadow: 0 0 22px rgba(53,184,241,0.14), inset 0 0 18px rgba(53,184,241,0.04); }
  @keyframes popIn { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.35)} 70%{opacity:1;transform:translate(-50%,-50%) scale(1.06)} 100%{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .bubble .b-name { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; color:rgba(53,184,241,0.55); text-transform:uppercase; margin-bottom:4px; line-height:1; }
  .bubble .b-text { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--text); line-height:1.2; word-break:break-word; padding:0 10px; }
  .cline { stroke: var(--line-color); stroke-width: 1.5; stroke-linecap: round; }
</style>
</head>
<body>

<div id="sala-badge">
  <span id="sala-label">código de sala</span>
  <span id="sala-code">——</span>
  <span id="sala-hint">los clientes escriben este código</span>
</div>

<div id="room-badge">
  <div id="room-dot" class="connecting"></div>
  <div id="badge-inner">
    <span id="room-label-small">estado</span>
    <span id="room-code">iniciando...</span>
  </div>
</div>

<div id="conn-badge">
  <span id="conn-count">0</span>
  <span>conectados</span>
</div>

<div id="qr-badge">
  <span id="qr-label">escanear para unirse</span>
  <img id="qr-img" src="" alt="QR" />
  <input type="file" id="qr-input" accept="image/*" style="display:none" />
  <label for="qr-input" id="qr-placeholder" style="
    width:110px; height:110px; border-radius:6px;
    background:rgba(53,184,241,0.08); border:1px dashed rgba(53,184,241,0.4);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-family:'Space Mono',monospace;
    font-size:9px; color:rgba(53,184,241,0.5); letter-spacing:1px;
    text-align:center; padding:8px;
  ">CLICK PARA CARGAR QR</label>
</div>

<div id="canvas">
  <svg id="lines"></svg>
</div>
<div id="waiting-msg">esperando mensajes...</div>

<script>
  const ABLY_API_KEY = 'IuJmsQ.ILhVVQ:2elAknwxoShlQV4IU1Y3MV8Hf0X02xZ3v8dtGmuJDkI';
  const SALA_CODE    = 'VINCULO';

  const MAX_BUBBLES = 30, TOP_PAD = 56, BOT_PAD = 48;
  const MIN_SPEED = 0.25, MAX_SPEED = 0.85, DAMPING = 0.994, REPEL_K = 0.55, ATTRACT_K = 0.00012;
  let bubbles = [], clines = [], groups = {};

  const roomDot    = document.getElementById('room-dot');
  const roomCodeEl = document.getElementById('room-code');
  const connCountEl= document.getElementById('conn-count');
  const salaCodeEl = document.getElementById('sala-code');
  const canvasEl   = document.getElementById('canvas');
  const linesEl    = document.getElementById('lines');
  const waitingMsg = document.getElementById('waiting-msg');

  function initAbly() {
    const client = new Ably.Realtime({ 
      key: ABLY_API_KEY, 
      clientId: 'host-pantalla', 
      closeOnUnload: true 
    });

    client.connection.on('connected', () => {
      roomDot.className = 'online';
      roomCodeEl.textContent = 'en línea';
      salaCodeEl.textContent = SALA_CODE;
    });
    client.connection.on('connecting',   () => { roomDot.className = 'connecting'; roomCodeEl.textContent = 'conectando...'; });
    client.connection.on('disconnected', () => { roomDot.className = 'connecting'; roomCodeEl.textContent = 'sin conexión'; });
    client.connection.on('failed',       () => { roomDot.className = 'connecting'; roomCodeEl.textContent = 'error — verifica API key'; });

    const channel = client.channels.get('sala-' + SALA_CODE);

    // El host entra a presencia para poder consultarla
    channel.presence.enter({ role: 'host' });

    // Mensajes → burbujas
    channel.subscribe('message', (msg) => {
      const data = msg.data;
      if (data && data.text) addBubble(data.text, data.name || 'anon', data.original || normalize(data.text));
    });

    // ── Contador de conectados ──────────────────────────────────
    // Usamos presence.get() para obtener el estado real cada vez
    // que haya un cambio. Esto es más robusto que mantener un Set
    // cuando los clientes ya traen clientId único.
       async function refreshCount() {
      try {
        const members = await channel.presence.get();
        const clients = members.filter(m => m.clientId !== 'host-pantalla');
        connCountEl.textContent = members.length;
      } catch(err) {
        console.log('Error presencia:', err);
      }
    }

    channel.presence.subscribe('enter',  function() { refreshCount(); });
    channel.presence.subscribe('leave',  function() { refreshCount(); });
    channel.presence.subscribe('update', function() { refreshCount(); });

    // Snapshot inicial al conectar
    client.connection.on('connected', function() { refreshCount(); });
  }

  const normalize = t => String(t).toLowerCase().trim();
  function calcRadius(text) { return Math.max(48, Math.min(100, String(text).length * 4.2 + 40)); }
  function randVel() {
    const spd = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED), angle = Math.random() * Math.PI * 2;
    return { vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd };
  }

  function addBubble(text, name, groupKey) {
    waitingMsg.style.display = 'none';
    if (bubbles.length >= MAX_BUBBLES) { const old = bubbles.shift(); old.el && old.el.remove(); evict(old); }
    const W = window.innerWidth, H = window.innerHeight, r = calcRadius(text);
    const x = r + Math.random() * (W - r*2);
    const y = TOP_PAD + r + Math.random() * (H - TOP_PAD - BOT_PAD - r*2);
    const { vx, vy } = randVel();
    const el = document.createElement('div');
    el.className = 'bubble';
    el.style.cssText = "left:"+x+"px;top:"+y+"px;width:"+(r*2)+"px;height:"+(r*2)+"px";
    el.innerHTML = '<div class="b-name">' + esc(name) + '</div><div class="b-text">' + esc(text) + '</div>';
    canvasEl.appendChild(el);
    const key = groupKey || normalize(text);
    const entry = { el, x, y, vx, vy, radius: r, text, name, key };
    bubbles.push(entry);
    const grp = groups[key] || (groups[key] = []);
    for (const peer of grp) { addLine(entry, peer); entry.el.classList.add('connected'); peer.el.classList.add('connected'); }
    grp.push(entry);
  }

  function evict(b) {
    clines = clines.filter(c => { if (c.a===b||c.b===b) { c.el.remove(); return false; } return true; });
    const grp = groups[b.key];
    if (grp) { const i=grp.indexOf(b); if(i!==-1)grp.splice(i,1); if(grp.length===1)grp[0].el.classList.remove('connected'); if(grp.length===0)delete groups[b.key]; }
  }

  function addLine(a, b) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('class','cline'); linesEl.appendChild(el); clines.push({a,b,el});
  }

  function animate() {
    const W=window.innerWidth,H=window.innerHeight,n=bubbles.length;
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
      const a=bubbles[i],b=bubbles[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.01,minD=a.radius+b.radius+8;
      if(d<minD){const f=(minD-d)/d*REPEL_K*0.012;a.vx-=dx*f;a.vy-=dy*f;b.vx+=dx*f;b.vy+=dy*f;}
    }
    for(const c of clines){const{a,b}=c,dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.01,rest=a.radius+b.radius+60;if(d>rest){a.vx+=dx*ATTRACT_K;a.vy+=dy*ATTRACT_K;b.vx-=dx*ATTRACT_K;b.vy-=dy*ATTRACT_K;}}
    for(const b of bubbles){
      b.vx*=DAMPING;b.vy*=DAMPING;
      let spd=Math.hypot(b.vx,b.vy)||MIN_SPEED;
      if(spd<MIN_SPEED){const s=MIN_SPEED/spd;b.vx*=s;b.vy*=s;}
      if(spd>MAX_SPEED){const s=MAX_SPEED/spd;b.vx*=s;b.vy*=s;}
      b.x+=b.vx;b.y+=b.vy;
      if(b.x-b.radius<0){b.x=b.radius;b.vx=Math.abs(b.vx);}
      if(b.x+b.radius>W){b.x=W-b.radius;b.vx=-Math.abs(b.vx);}
      if(b.y-b.radius<TOP_PAD){b.y=TOP_PAD+b.radius;b.vy=Math.abs(b.vy);}
      if(b.y+b.radius>H){b.y=H-b.radius;b.vy=-Math.abs(b.vy);}
      b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
    }
    for(const c of clines){const{a,b}=c,dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.01,nx=dx/d,ny=dy/d;c.el.setAttribute('x1',a.x+nx*a.radius);c.el.setAttribute('y1',a.y+ny*a.radius);c.el.setAttribute('x2',b.x-nx*b.radius);c.el.setAttribute('y2',b.y-ny*b.radius);}
    requestAnimationFrame(animate);
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  initAbly();
  animate();
  const qrInput = document.getElementById('qr-input');
  const qrImg   = document.getElementById('qr-img');
  const qrPlaceholder = document.getElementById('qr-placeholder');
  
  qrInput.addEventListener('change', function() {
    const file = qrInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      qrImg.src = e.target.result;
      qrImg.style.display = 'block';
      qrPlaceholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
